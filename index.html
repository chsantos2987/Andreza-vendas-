<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Registro de Vendas</title>
<style>
  :root {
    --bg: #EFE6DA; --card: #FBF7EF; --ink: #2B2620; --ink-soft: #6B6155;
    --green: #2F5D50; --green-dark: #20423A; --gold: #B8874F; --rose: #B4535F;
    --line: rgba(43,38,32,0.14);
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  body.dark {
    --bg: #1B1712; --card: #26201A; --ink: #F3ECE1; --ink-soft: #B9AD9D;
    --green: #4B9483; --green-dark: #16302A; --gold: #D8A867; --rose: #D9838F;
    --line: rgba(255,255,255,0.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--ink); min-height: 100vh; }
  button, input { font-family: inherit; font-size: 15px; }
  button { cursor: pointer; }
  a { text-decoration: none; }
  .app { max-width: 480px; margin: 0 auto; position: relative; padding-bottom: 70px; }
  .header { background: var(--green-dark); padding: 18px 20px 14px; display: flex; align-items: center; justify-content: space-between; color: #fff; }
  .header-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; }
  .header-sub { color: rgba(255,255,255,0.65); font-size: 12px; }
  .icon-btn { background: none; border: none; color: inherit; font-size: 20px; padding: 4px; }
  .content { padding: 8px 16px 24px; }
  h1.page-title { font-family: var(--font-display); color: var(--ink); font-size: 24px; font-weight: 700; margin: 4px 0 4px; }
  .subtitle { color: var(--ink-soft); font-size: 13px; margin: 0 0 16px; }
  .section-label { color: var(--ink-soft); font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; margin: 4px 0 8px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 16px; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; color: var(--ink-soft); font-size: 12px; margin-bottom: 4px; }
  .input, input[type=text], input[type=tel], input[type=number], input[type=date] {
    width: 100%; color: var(--ink); border: 1px solid var(--line); border-radius: 10px;
    padding: 9px 12px; background: transparent; outline: none;
  }
  .input:focus, input:focus { border-color: var(--green); }
  .money-input { display: flex; align-items: center; gap: 8px; }
  .money-input span { font-family: var(--font-mono); color: var(--ink); }
  .money-input input { font-family: var(--font-mono); font-size: 22px; border: none; border-bottom: 2px solid var(--line); border-radius: 0; padding: 4px 0; background: transparent; width: 100%; }
  .toggle-group { display: flex; background: var(--bg); border-radius: 12px; padding: 4px; gap: 4px; }
  .toggle-btn { flex: 1; border: none; border-radius: 9px; padding: 9px 0; font-size: 13px; font-weight: 600; background: transparent; color: var(--ink-soft); }
  .toggle-btn.active { background: var(--green); color: #fff; }
  .btn { border: none; border-radius: 12px; padding: 12px 0; font-weight: 600; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:disabled { background: var(--line); color: var(--ink-soft); }
  .btn-outline { background: none; border: 1px solid var(--line); color: var(--ink); }
  .btn-sm { padding: 8px 0; font-size: 13px; border-radius: 10px; }
  .hint { color: var(--gold); font-size: 11px; margin-top: 4px; }
  .row-2 { display: flex; gap: 8px; }
  .photo-drop { border: 2px dashed var(--line); color: var(--green); border-radius: 12px; width: 100%; padding: 18px 0; background: none; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 13px; }
  .photo-preview { position: relative; display: inline-block; }
  .photo-preview img { width: 110px; height: 110px; object-fit: cover; border-radius: 12px; border: 1px solid var(--line); }
  .photo-remove { position: absolute; top: -8px; right: -8px; background: var(--rose); color: #fff; border: none; border-radius: 999px; width: 24px; height: 24px; }
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap span { position: absolute; left: 12px; top: 10px; color: var(--ink-soft); font-size: 14px; }
  .search-wrap input { padding-left: 34px; }
  .sale-tag { background: var(--card); border: 1px solid var(--line); border-radius: 16px; position: relative; padding: 14px 16px 14px 40px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .sale-tag.pending { border-color: var(--gold); }
  .tag-hole { width: 14px; height: 14px; border-radius: 50%; background: var(--bg); border: 2px solid var(--line); position: absolute; top: 14px; left: 14px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.15); }
  .sale-top-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .sale-date { font-family: var(--font-mono); color: var(--ink-soft); font-size: 12px; }
  .badge { background: var(--gold); color: #fff; font-size: 10px; border-radius: 999px; padding: 2px 8px; display: inline-flex; align-items: center; gap: 4px; }
  .conferida-btn { background: none; border: none; font-size: 10px; padding: 0; display: inline-flex; align-items: center; gap: 4px; color: var(--ink-soft); }
  .conferida-btn.ok { color: var(--green); }
  .sale-valor { font-family: var(--font-display); color: var(--ink); font-weight: 700; font-size: 20px; }
  .sale-valor .levado-tag { font-size: 12px; color: var(--ink-soft); font-family: var(--font-body); font-weight: 400; }
  .sale-client { color: var(--ink-soft); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sale-thumb { width: 46px; height: 46px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); }
  .sale-thumb-empty { width: 46px; height: 46px; border-radius: 8px; border: 1px dashed var(--line); color: var(--ink-soft); display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .del-btn { background: none; border: none; color: var(--rose); padding: 4px; font-size: 16px; }
  .month-switch { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .month-switch button { background: none; border: none; color: var(--green); font-size: 24px; padding: 4px 10px; }
  .month-switch span { font-family: var(--font-display); color: var(--ink); text-transform: capitalize; font-size: 17px; }
  .empty-msg { color: var(--ink-soft); font-size: 14px; text-align: center; padding: 40px 0; }
  .hero-card { background: var(--green-dark); border-radius: 20px; padding: 20px; margin-bottom: 16px; color: #fff; }
  .hero-flex { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .hero-label { color: rgba(255,255,255,0.7); font-size: 12px; }
  .hero-value { font-family: var(--font-display); font-size: 28px; font-weight: 700; }
  .meta-ring { width: 92px; height: 92px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: conic-gradient(var(--gold) calc(var(--pct) * 1%), rgba(255,255,255,0.16) 0); }
  .meta-ring-inner { width: 72px; height: 72px; border-radius: 50%; background: var(--green-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .meta-ring-value { font-family: var(--font-display); font-size: 19px; font-weight: 700; color: #fff; line-height: 1; }
  .meta-ring-label { font-size: 8.5px; color: rgba(255,255,255,0.65); margin-top: 2px; text-align: center; line-height: 1.2; }
  .hero-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 8px; }
  .progress-track { background: rgba(255,255,255,0.2); border-radius: 999px; height: 12px; }
  .progress-track.light { background: var(--bg); height: 10px; }
  .progress-fill { background: var(--gold); height: 100%; border-radius: 999px; transition: width 0.4s; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .stat-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 12px; }
  .stat-label { color: var(--ink-soft); font-size: 11px; }
  .stat-value { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 4px; margin-top: 4px; }
  .stat-sub { color: var(--ink-soft); font-size: 11px; }
  .alert-card { border: 1px solid var(--rose); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
  .alert-title { color: var(--rose); font-size: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
  .alert-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
  .bar-chart-wrap { position: relative; padding-top: 18px; }
  .bar-chart-grid { position: absolute; top: 18px; left: 0; right: 0; bottom: 20px; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
  .bar-chart-grid div { border-top: 1px dashed var(--line); }
  .bar-chart { display: flex; align-items: flex-end; gap: 2px; height: 140px; position: relative; }
  .bar-col { flex: 1; height: 100%; display: flex; align-items: flex-end; position: relative; }
  .bar { width: 100%; background: var(--green); border-radius: 3px 3px 0 0; min-height: 0; transition: height 0.5s ease; }
  .bar-best { background: linear-gradient(180deg, var(--gold), var(--green)) !important; }
  .bar-best-label { position: absolute; top: -17px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--gold); font-family: var(--font-mono); white-space: nowrap; font-weight: 600; }
  .today-marker { position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--rose); }
  .chart-axis { display: flex; justify-content: space-between; color: var(--ink-soft); font-size: 10px; margin-top: 6px; }
  .week-chart { display: flex; align-items: flex-end; gap: 10px; height: 90px; margin-top: 4px; }
  .week-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 4px; }
  .week-bar-track { width: 100%; height: 100%; display: flex; align-items: flex-end; }
  .week-bar { width: 100%; border-radius: 6px 6px 3px 3px; background: var(--green); min-height: 4px; transition: height 0.5s ease; }
  .week-bar-val { font-size: 9px; color: var(--ink-soft); font-family: var(--font-mono); }
  .week-label { font-size: 10px; color: var(--ink-soft); }
  .mini-stat-icon { font-size: 15px; }
  .tier-row { border-radius: 12px; border: 1px solid var(--line); padding: 8px 16px; display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; background: var(--card); color: var(--ink); }
  .tier-row.current { background: var(--gold); color: #fff; border-color: var(--gold); }
  .tier-row span:last-child { font-family: var(--font-mono); }
  .client-row { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; }
  .client-row-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid var(--line); }
  .avatar-initial { width: 38px; height: 38px; border-radius: 50%; background: var(--green); color: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .avatar-lg { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 1px solid var(--line); }
  .avatar-initial-lg { width: 64px; height: 64px; border-radius: 50%; background: var(--green); color: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 26px; }
  .avatar-photo-btn { background: none; border: none; color: var(--green); font-size: 12px; padding: 0; }
  .client-name { font-family: var(--font-display); color: var(--ink); font-size: 16px; font-weight: 600; }
  .client-sub { color: var(--ink-soft); font-size: 12px; }
  .wa-btn { background: #25D366; color: #fff; border-radius: 999px; padding: 8px; display: flex; font-size: 16px; }
  .modal-backdrop { background: rgba(0,0,0,0.75); position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-box { background: var(--card); border-radius: 16px; padding: 16px; max-width: 380px; width: 100%; max-height: 82vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .modal-header .title { font-family: var(--font-display); color: var(--ink); font-size: 18px; }
  .modal-box img { width: 100%; border-radius: 10px; }
  .autocomplete-wrap { position: relative; }
  .autocomplete-list { background: var(--card); border: 1px solid var(--line); border-radius: 10px; position: absolute; z-index: 10; width: 100%; margin-top: 4px; }
  .autocomplete-item { padding: 8px 12px; color: var(--ink); font-size: 14px; cursor: pointer; }
  .tabbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--card); border-top: 1px dashed var(--line); display: flex; justify-content: space-around; padding: 6px 0; }
  .tab-btn { background: none; border: none; color: var(--ink-soft); display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 6px; }
  .tab-btn.active { color: var(--green); }
  .tab-icon { font-size: 18px; }
  .tab-label { font-size: 9.5px; }
  .loading { text-align: center; padding: 60px 0; font-size: 28px; }
  .flex-gap { display: flex; gap: 8px; }
  .top-client-row { display: flex; justify-content: space-between; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 8px 16px; font-size: 14px; margin-bottom: 8px; }
  .checkbox-hint { font-size: 11px; color: var(--ink-soft); margin-top: 6px; }
</style>
</head>
<body>
<div class="app">
  <div id="header"></div>
  <div id="content" class="content"></div>
  <div id="tabbar"></div>
  <div id="modal-root"></div>
</div>

<script>
"use strict";

// ---------- storage (localStorage, sem dependencia de rede) ----------
const storage = {
  async get(key) { const v = localStorage.getItem(key); return v === null ? null : { key, value: v }; },
  async set(key, value) { localStorage.setItem(key, value); return { key, value }; },
  async delete(key) { localStorage.removeItem(key); return { key, deleted: true }; },
  async list(prefix) { return { keys: Object.keys(localStorage).filter((k) => k.startsWith(prefix)) }; },
};

// ---------- helpers ----------
const todayISO = () => new Date().toISOString().slice(0, 10);
const monthKey = (iso) => iso.slice(0, 7);
const brl = (n) => (n || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
const esc = (s) => (s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const fmtDate = (iso) => new Date(iso + "T00:00:00").toLocaleDateString("pt-BR", { day: "2-digit", month: "short" });
const fmtDateFull = (iso) => new Date(iso + "T00:00:00").toLocaleDateString("pt-BR");
const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);

function prevMonthKey(mk) { const [y, m] = mk.split("-").map(Number); const d = new Date(y, m - 2, 1); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; }
function daysInMonth(mk) { const [y, m] = mk.split("-").map(Number); return new Date(y, m, 0).getDate(); }
function waLink(telefone, text) {
  let digits = (telefone || "").replace(/\D/g, "");
  if (digits && !digits.startsWith("55")) digits = "55" + digits;
  const base = digits ? `https://wa.me/${digits}` : "https://wa.me/";
  return text ? `${base}?text=${encodeURIComponent(text)}` : base;
}
function tierFor(total, tiers) {
  const sorted = [...tiers].sort((a, b) => a.min - b.min);
  let current = sorted[0] || { min: 0, pct: 0 };
  for (const t of sorted) if (total >= t.min) current = t;
  const idx = sorted.indexOf(current);
  return { current, next: sorted[idx + 1] || null, sorted };
}
function compressImage(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("erro ao ler"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("erro ao carregar imagem"));
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

const DEFAULT_SETTINGS = {
  loja: "Minha loja",
  tiers: [{ min: 0, pct: 2 }, { min: 5000, pct: 3 }, { min: 10000, pct: 5 }],
  metaMensal: 15000,
  diasAlertaCondicional: 7,
  darkMode: false,
};

const TABS = [
  { id: "inicio", label: "Início", icon: "🏠" },
  { id: "registrar", label: "Registrar", icon: "➕" },
  { id: "vendas", label: "Vendas", icon: "📋" },
  { id: "clientes", label: "Clientes", icon: "👥" },
  { id: "desempenho", label: "Metas", icon: "📈" },
  { id: "config", label: "Ajustes", icon: "⚙️" },
];

// ---------- state ----------
let state = { tab: "inicio", sales: [], clients: [], settings: DEFAULT_SETTINGS, month: monthKey(todayISO()), loading: true };
let ui = {
  vendasBusca: "", clientesBusca: "", openSaleId: null, confirmSaleId: null, openClientId: null,
  showNewClientForm: false, regTipo: "direta", regClienteId: null, regFoto: null, regCompressing: false,
  ncFoto: null, ncCompressing: false,
};

function initials(nome) {
  const parts = (nome || "?").trim().split(/\s+/);
  return ((parts[0]?.[0] || "") + (parts[1]?.[0] || "")).toUpperCase() || "?";
}
function avatarHTML(client, size) {
  const cls = size === "lg" ? "avatar-lg" : "avatar";
  const clsInit = size === "lg" ? "avatar-initial-lg" : "avatar-initial";
  return client.foto ? `<img class="${cls}" src="${client.foto}" alt="${esc(client.nome)}">` : `<div class="${clsInit}">${initials(client.nome)}</div>`;
}
function saleById(id) { return state.sales.find((s) => s.id === id); }
function clientById(id) { return state.clients.find((c) => c.id === id); }

// ---------- render root ----------
function renderAll() {
  document.body.classList.toggle("dark", !!state.settings.darkMode);
  renderHeader();
  renderTabbar();
  renderContent();
}
function renderHeader() {
  document.getElementById("header").innerHTML = `
    <div class="header">
      <div>
        <div class="header-title">${esc(state.settings.loja)}</div>
        <div class="header-sub">controle pessoal de vendas</div>
      </div>
      <button class="icon-btn" data-action="toggle-theme">${state.settings.darkMode ? "☀️" : "🌙"}</button>
    </div>`;
}
function renderTabbar() {
  document.getElementById("tabbar").innerHTML = `
    <div class="tabbar">
      ${TABS.map((t) => `
        <button class="tab-btn ${state.tab === t.id ? "active" : ""}" data-action="set-tab" data-tab="${t.id}">
          <span class="tab-icon">${t.icon}</span><span class="tab-label">${t.label}</span>
        </button>`).join("")}
    </div>`;
}
function renderContent() {
  const c = document.getElementById("content");
  if (state.loading) { c.innerHTML = `<div class="loading">⏳</div>`; return; }
  if (state.tab === "inicio") c.innerHTML = renderInicio();
  else if (state.tab === "registrar") { c.innerHTML = renderRegistrar(); }
  else if (state.tab === "vendas") { c.innerHTML = renderVendasShell(); refreshVendasList(); }
  else if (state.tab === "clientes") { c.innerHTML = renderClientesShell(); refreshClientesList(); }
  else if (state.tab === "desempenho") c.innerHTML = renderDesempenho();
  else if (state.tab === "config") c.innerHTML = renderConfig();
  renderModals();
}

// ---------- sale tag ----------
function saleTagHTML(sale) {
  const pending = sale.status === "pendente";
  const displayDate = pending ? sale.dataLevado : sale.date;
  const displayValor = pending ? sale.valorLevado : sale.valor;
  return `
  <div class="sale-tag ${pending ? "pending" : ""}" data-action="${pending ? "open-confirm" : "open-sale"}" data-id="${sale.id}">
    <div class="tag-hole"></div>
    <div style="min-width:0;flex:1;">
      <div class="sale-top-row">
        <span class="sale-date">${fmtDate(displayDate)}</span>
        ${pending ? `<span class="badge">🕒 condicional</span>` :
          `<button class="conferida-btn ${sale.conferida ? "ok" : ""}" data-action="toggle-conferida" data-id="${sale.id}">${sale.conferida ? "✅" : "◯"} ${sale.conferida ? "conferida" : "conferir"}</button>`}
      </div>
      <div class="sale-valor">${brl(displayValor)}${pending ? `<span class="levado-tag"> levado</span>` : ""}</div>
      ${sale.clienteNome ? `<div class="sale-client">${esc(sale.clienteNome)}</div>` : ""}
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
      ${sale.foto ? `<img class="sale-thumb" src="${sale.foto}" alt="comprovante">` : `<div class="sale-thumb-empty">🚫</div>`}
      <button class="del-btn" data-action="delete-sale" data-id="${sale.id}">🗑️</button>
    </div>
  </div>`;
}

// ---------- Início ----------
function renderInicio() {
  const nowMonth = monthKey(todayISO());
  const monthSales = state.sales.filter((s) => s.status === "confirmada" && monthKey(s.date) === nowMonth);
  const total = monthSales.reduce((a, s) => a + s.valor, 0);
  const meta = state.settings.metaMensal || 0;
  const metaPct = meta > 0 ? Math.min(100, (total / meta) * 100) : 0;
  const dim = daysInMonth(nowMonth);
  const todayDay = new Date().getDate();
  const diasPassados = Math.min(todayDay, dim);
  const esperado = meta * (diasPassados / dim);
  const diff = total - esperado;
  const noRitmo = diff >= 0;
  const prevKey = prevMonthKey(nowMonth);
  const prevTotal = state.sales.filter((s) => s.status === "confirmada" && monthKey(s.date) === prevKey).reduce((a, s) => a + s.valor, 0);
  const variacao = prevTotal > 0 ? ((total - prevTotal) / prevTotal) * 100 : null;

  const chartData = Array.from({ length: dim }, (_, i) => {
    const day = i + 1;
    const val = monthSales.filter((s) => new Date(s.date + "T00:00:00").getDate() === day).reduce((a, s) => a + s.valor, 0);
    return { dia: day, valor: val };
  });
  const maxVal = Math.max(1, ...chartData.map((d) => d.valor));
  const bestDay = chartData.reduce((best, d) => (d.valor > (best?.valor || 0) ? d : best), null);
  const ticketMedio = monthSales.length > 0 ? total / monthSales.length : 0;

  const weeks = [];
  for (let start = 1; start <= dim; start += 7) {
    const end = Math.min(start + 6, dim);
    const valor = chartData.filter((d) => d.dia >= start && d.dia <= end).reduce((a, d) => a + d.valor, 0);
    weeks.push({ label: `${start}-${end}`, valor });
  }
  const maxWeek = Math.max(1, ...weeks.map((w) => w.valor));

  const alertas = state.sales.filter((s) => s.status === "pendente")
    .map((s) => ({ ...s, dias: daysBetween(s.dataLevado, todayISO()) }))
    .filter((s) => s.dias >= (state.settings.diasAlertaCondicional || 7)).sort((a, b) => b.dias - a.dias);

  return `
    <h1 class="page-title">Olá!</h1>
    <p class="subtitle">Seu resumo de ${new Date().toLocaleDateString("pt-BR", { month: "long" })}.</p>

    <div class="hero-card">
      <div class="hero-flex">
        <div>
          <div class="hero-label">Meta do mês</div>
          <div class="hero-value">${brl(total)}</div>
          <div class="hero-label">de ${brl(meta)}</div>
        </div>
        <div class="meta-ring" style="--pct:${metaPct}">
          <div class="meta-ring-inner">
            <div class="meta-ring-value">${metaPct.toFixed(0)}%</div>
            <div class="meta-ring-label">da meta</div>
          </div>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="stat-card">
        <div class="stat-label">Ritmo do mês</div>
        <div class="stat-value" style="color:${noRitmo ? "var(--green)" : "var(--rose)"}">${noRitmo ? "↑" : "↓"} ${noRitmo ? "no ritmo" : "atrasada"}</div>
        <div class="stat-sub">${brl(Math.abs(diff))} ${noRitmo ? "à frente" : "atrás"}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Vs. mês passado</div>
        ${variacao === null ? `<div class="stat-value">sem dados</div>` :
          `<div class="stat-value" style="color:${variacao >= 0 ? "var(--green)" : "var(--rose)"}">${variacao >= 0 ? "↑" : "↓"} ${Math.abs(variacao).toFixed(0)}%</div>`}
      </div>
    </div>

    <div class="grid-2">
      <div class="stat-card">
        <div class="stat-label"><span class="mini-stat-icon">🏆</span> Melhor dia</div>
        ${bestDay && bestDay.valor > 0 ? `<div class="stat-value" style="color:var(--gold);">${brl(bestDay.valor)}</div><div class="stat-sub">dia ${bestDay.dia}</div>` : `<div class="stat-value">sem vendas</div>`}
      </div>
      <div class="stat-card">
        <div class="stat-label"><span class="mini-stat-icon">🎟️</span> Ticket médio</div>
        <div class="stat-value" style="color:var(--ink);">${brl(ticketMedio)}</div>
        <div class="stat-sub">${monthSales.length} venda${monthSales.length !== 1 ? "s" : ""}</div>
      </div>
    </div>

    ${alertas.length > 0 ? `
      <div class="alert-card">
        <div class="alert-title">⚠️ condicionais pra cobrar</div>
        ${alertas.slice(0, 3).map((s) => `
          <div class="alert-row">
            <span>${esc(s.clienteNome)} · ${s.dias}d</span>
            ${s.clienteTelefone ? `<a href="${waLink(s.clienteTelefone, `Oi ${s.clienteNome.split(" ")[0]}, tudo bem? Posso confirmar com você sobre as peças que ficaram em condicional?`)}" target="_blank" style="color:#25D366;font-size:16px;">💬</a>` : `<span class="stat-sub">sem telefone</span>`}
          </div>`).join("")}
      </div>` : ""}

    <div class="section-label">Vendas do mês por dia</div>
    <div class="card" style="margin-bottom:16px;padding:12px;">
      <div class="bar-chart-wrap">
        <div class="bar-chart-grid"><div></div><div></div><div></div></div>
        <div class="bar-chart">
          ${chartData.map((d) => {
            const isBest = bestDay && d.dia === bestDay.dia && d.valor > 0;
            const isToday = d.dia === todayDay;
            return `<div class="bar-col" title="dia ${d.dia}: ${brl(d.valor)}">
              ${isBest ? `<span class="bar-best-label">${brl(d.valor)}</span>` : ""}
              <div class="bar ${isBest ? "bar-best" : ""}" style="height:${(d.valor / maxVal) * 100}%;${d.valor === 0 ? "background:transparent;" : ""}"></div>
              ${isToday ? `<span class="today-marker" title="hoje"></span>` : ""}
            </div>`;
          }).join("")}
        </div>
      </div>
      <div class="chart-axis"><span>1</span><span>${Math.round(chartData.length / 2)}</span><span>${chartData.length}</span></div>
    </div>

    <div class="section-label">Por semana</div>
    <div class="card" style="margin-bottom:16px;padding:14px;">
      <div class="week-chart">
        ${weeks.map((w, i) => `
          <div class="week-col">
            <div class="week-bar-val">${w.valor > 0 ? brl(w.valor).replace("R$", "").trim() : "—"}</div>
            <div class="week-bar-track"><div class="week-bar" style="height:${(w.valor / maxWeek) * 100}%;"></div></div>
            <div class="week-label">S${i + 1}</div>
          </div>`).join("")}
      </div>
    </div>

    <button class="btn btn-primary" data-action="set-tab" data-tab="registrar">➕ Registrar nova venda</button>
  `;
}

        <label>Foto ${ui.regTipo === "condicional" ? "da nota/lista do que levou" : "do comprovante"}</label>
        <input id="reg-foto-input" type="file" accept="image/*" capture="environment" style="display:none;">
        <div id="reg-foto-area">${renderFotoArea()}</div>
      </div>

      <button id="reg-submit" class="btn btn-primary" data-action="reg-submit" disabled>✓ ${ui.regTipo === "condicional" ? "Registrar condicional" : "Salvar venda"}</button>

}
function renderFotoArea() {
  if (ui.regCompressing) return `<button class="photo-drop" disabled>⏳<span>Processando foto...</span></button>`;
  if (ui.regFoto) return `
    <div class="photo-preview">
      <img src="${ui.regFoto}" alt="comprovante">
      <button class="photo-remove" data-action="reg-remove-foto">✕</button>
    </div>`;
  return `<button class="photo-drop" data-action="reg-pick-foto">📷<span>Tirar foto do comprovante</span></button>`;
}
function refreshFotoArea() { const el = document.getElementById("reg-foto-area"); if (el) el.innerHTML = renderFotoArea(); }
function refreshRegSubmitState() {
  const btn = document.getElementById("reg-submit");
  if (!btn) return;
  const valor = document.getElementById("reg-valor");
  const clienteNome = document.getElementById("reg-cliente-nome");
  const valid = valor && parseFloat((valor.value || "").replace(",", ".")) > 0;
  const clienteOk = ui.regTipo === "direta" || (clienteNome && clienteNome.value.trim());
  btn.disabled = !valid || !clienteOk;
}
function refreshClienteSuggestions(forceShow) {
  const input = document.getElementById("reg-cliente-nome");
  const box = document.getElementById("reg-cliente-suggestions");
  const hint = document.getElementById("reg-cliente-hint");
  const extra = document.getElementById("reg-cliente-extra");
  if (!input || !box) return;
  const value = input.value.trim();
  extra.style.display = value ? "flex" : "none";
  if (!value) {
    hint.innerHTML = "";
    if (!forceShow || state.clients.length === 0) { box.innerHTML = ""; return; }
    const all = [...state.clients].sort((a, b) => a.nome.localeCompare(b.nome, "pt-BR")).slice(0, 8);
    box.innerHTML = `<div class="autocomplete-list">${all.map((c) => `<div class="autocomplete-item" data-action="reg-pick-client" data-id="${c.id}">${esc(c.nome)}</div>`).join("")}</div>`;
    return;
  }
  const matches = state.clients.filter((c) => c.nome.toLowerCase().includes(value.toLowerCase())).slice(0, 8);
  const isExisting = state.clients.some((c) => c.nome.toLowerCase() === value.toLowerCase());
  box.innerHTML = matches.length ? `<div class="autocomplete-list">${matches.map((c) => `<div class="autocomplete-item" data-action="reg-pick-client" data-id="${c.id}">${esc(c.nome)}</div>`).join("")}</div>` : "";
  hint.innerHTML = !isExisting ? `<p class="hint">cliente novo — vai ser salvo na sua lista</p>` : "";
}

// ---------- Desempenho ----------
function renderDesempenho() {
  const monthSales = state.sales.filter((s) => s.status === "confirmada" && monthKey(s.date) === state.month);
  const total = monthSales.reduce((a, s) => a + s.valor, 0);
  const { current, next, sorted } = tierFor(total, state.settings.tiers);
  const comissao = total * (current.pct / 100);
  const pendentes = state.sales.filter((s) => s.status === "pendente");
  const totalPendente = pendentes.reduce((a, s) => a + (s.valorLevado || 0), 0);
  let progressPct = 100;
  if (next) { const span = next.min - current.min; progressPct = Math.max(0, Math.min(100, ((total - current.min) / span) * 100)); }

  const topMap = {};
  monthSales.forEach((s) => { const k = s.clienteNome || "sem nome"; topMap[k] = (topMap[k] || 0) + s.valor; });
  const topClientes = Object.entries(topMap).map(([nome, total]) => ({ nome, total })).sort((a, b) => b.total - a.total).slice(0, 3);

  return `
    <h1 class="page-title">Desempenho</h1>
    <div class="month-switch">
      <button data-action="month-shift" data-delta="-1">‹</button>
      <span>${new Date(state.month + "-02").toLocaleDateString("pt-BR", { month: "long", year: "numeric" })}</span>
      <button data-action="month-shift" data-delta="1">›</button>
    </div>

    <div class="hero-card">
      <div class="hero-label">Total vendido no mês</div>
      <div class="hero-value">${brl(total)}</div>
      <div class="hero-label" style="color:rgba(255,255,255,0.85);margin-top:4px;">Faixa atual: <b>${current.pct}%</b> de comissão</div>
      <div style="font-family:var(--font-mono);font-size:18px;margin-top:8px;">≈ ${brl(comissao)} de comissão estimada</div>
    </div>

    ${totalPendente > 0 ? `
      <div class="card" style="border:1px dashed var(--gold);margin-bottom:16px;">
        <div class="section-label" style="color:var(--gold);">🕒 ainda não entra na comissão</div>
        <div style="font-family:var(--font-display);font-size:20px;font-weight:600;">${brl(totalPendente)} em condicional</div>
        <div class="stat-sub">${pendentes.length} cliente${pendentes.length !== 1 ? "s" : ""} com roupa em casa aguardando confirmação</div>
      </div>` : ""}

    ${next ? `
      <div class="card" style="margin-bottom:16px;">
        <div class="subtitle" style="margin-bottom:8px;">Faltam <b style="color:var(--ink)">${brl(Math.max(0, next.min - total))}</b> para a próxima faixa (${next.pct}%)</div>
        <div class="progress-track light"><div class="progress-fill" style="width:${progressPct}%"></div></div>
      </div>` : `<div class="card" style="margin-bottom:16px;color:var(--gold);font-size:14px;">Você atingiu a maior faixa de comissão disponível 🎉</div>`}

    <div class="section-label">Faixas configuradas</div>
    ${sorted.map((t) => `<div class="tier-row ${t.min === current.min ? "current" : ""}"><span>a partir de ${brl(t.min)}</span><span>${t.pct}%</span></div>`).join("")}

    ${topClientes.length ? `
      <div class="section-label" style="margin-top:16px;">Top clientes do mês</div>
      ${topClientes.map((c, i) => `<div class="top-client-row"><span>${i + 1}. ${esc(c.nome)}</span><span style="font-family:var(--font-mono);">${brl(c.total)}</span></div>`).join("")}
    ` : ""}

    <div class="section-label" style="margin-top:16px;">Fechamento do mês</div>
    <div class="flex-gap">
      <button class="btn btn-outline btn-sm" data-action="copy-resumo">📋 Copiar resumo</button>
      <a class="btn btn-primary btn-sm" style="display:flex;" href="${waLink("", buildResumoText(total, monthSales.length, current.pct, comissao, totalPendente, pendentes.length, topClientes))}" target="_blank">📤 Compartilhar</a>
    </div>
  `;
}
function buildResumoText(total, count, pct, comissao, totalPendente, pendCount, topClientes) {
  const label = new Date(state.month + "-02").toLocaleDateString("pt-BR", { month: "long", year: "numeric" });
  let txt = `Resumo de vendas — ${label}\n\nTotal vendido: ${brl(total)}\nVendas confirmadas: ${count}\nFaixa de comissão: ${pct}%\nComissão estimada: ${brl(comissao)}\n`;
  if (totalPendente > 0) txt += `Condicional pendente: ${brl(totalPendente)} (${pendCount} cliente(s))\n`;
  if (topClientes.length) txt += `\nTop clientes:\n` + topClientes.map((c, i) => `${i + 1}. ${c.nome} — ${brl(c.total)}`).join("\n");
  return txt;
}

      <div class="field"><label>Nome da loja</label><input id="cfg-loja" type="text" value="${esc(s.loja)}"></div>
      <div class="field"><label>Meta mensal (R$)</label><input id="cfg-meta" type="number" value="${s.metaMensal}"></div>
      <div class="field"><label>Alertar condicional pendente após quantos dias?</label><input id="cfg-dias" type="number" value="${s.diasAlertaCondicional}"></div>
    </div>
    <div class="section-label">Faixas de comissão</div>
    <div class="card" style="margin-bottom:16px;">
      <div id="cfg-tiers">${renderTierRows(s.tiers)}</div>
      <button class="icon-btn" style="color:var(--green);font-size:13px;" data-action="cfg-add-tier">➕ adicionar faixa</button>
    </div>
    <button class="btn btn-primary" data-action="cfg-save">Salvar configurações</button>
  `;
}
function renderTierRows(tiers) {
  return tiers.map((t, i) => `
    <div class="row-2" style="align-items:flex-end;margin-bottom:10px;">
      <div style="flex:1;"><label style="font-size:11px;color:var(--ink-soft);">a partir de R$</label><input class="cfg-tier-min" data-i="${i}" type="number" value="${t.min}"></div>
      <div style="width:90px;"><label style="font-size:11px;color:var(--ink-soft);">%</label><input class="cfg-tier-pct" data-i="${i}" type="number" value="${t.pct}"></div>
      <button class="del-btn" data-action="cfg-remove-tier" data-i="${i}">🗑️</button>
    </div>`).join("");
}

// ---------- Modals ----------
function renderModals() {
  const root = document.getElementById("modal-root");
  if (ui.openSaleId) { root.innerHTML = renderPhotoModal(saleById(ui.openSaleId)); return; }
  if (ui.confirmSaleId) { root.innerHTML = renderConfirmModal(saleById(ui.confirmSaleId)); return; }
  if (ui.openClientId) { root.innerHTML = renderClientModal(clientById(ui.openClientId)); return; }
  root.innerHTML = "";
}
function renderPhotoModal(sale) {
  if (!sale) return "";
  return `
    <div class="modal-backdrop" data-action="close-modal">
      <div class="modal-box" onclick="if(!event.target.closest('[data-action]')) event.stopPropagation()">
        <div class="modal-header"><span class="title">${brl(sale.valor)}</span><button class="icon-btn" data-action="close-modal">✕</button></div>
        ${sale.foto ? `<img src="${sale.foto}" alt="comprovante">` : `<div class="empty-msg">Sem foto anexada nesta venda.</div>`}
        <div class="stat-sub" style="margin-top:12px;">${fmtDateFull(sale.date)}${sale.clienteNome ? ` · ${esc(sale.clienteNome)}` : ""}${sale.caixa ? ` · ${esc(sale.caixa)}` : ""}</div>
      </div>
    </div>`;
}
function renderConfirmModal(sale) {
  if (!sale) return "";
  return `
    <div class="modal-backdrop" data-action="close-modal">
      <div class="modal-box" onclick="if(!event.target.closest('[data-action]')) event.stopPropagation()">
        <div class="modal-header"><span class="title">Confirmar condicional</span><button class="icon-btn" data-action="close-modal">✕</button></div>
        ${sale.foto ? `<img src="${sale.foto}" alt="comprovante" style="margin-bottom:12px;">` : ""}
        <div class="subtitle">${esc(sale.clienteNome)} levou <b style="color:var(--ink)">${brl(sale.valorLevado)}</b> em ${fmtDateFull(sale.dataLevado)}</div>
        <div class="field"><label>Quanto ela ficou / comprou de fato?</label>
          <div class="money-input"><span>R$</span><input id="confirm-valor" type="text" inputmode="decimal" value="${sale.valorLevado}"></div>
        </div>
        <button class="btn btn-primary" data-action="confirm-condicional" data-id="${sale.id}">📦 Confirmar venda</button>
      </div>
    </div>`;
}
function renderClientModal(client) {
  if (!client) return "";
  const historico = state.sales.filter((s) => s.clienteId === client.id || s.clienteNome === client.nome).sort((a, b) => (a.date < b.date ? 1 : -1));
  const total = historico.filter((s) => s.status === "confirmada").reduce((a, s) => a + s.valor, 0);
  return `
    <div class="modal-backdrop" data-action="close-modal">
      <div class="modal-box" onclick="if(!event.target.closest('[data-action]')) event.stopPropagation()">
        <div class="modal-header">
          <div style="display:flex;align-items:center;gap:12px;">
            ${avatarHTML(client, "lg")}
            <div>
              <div class="title">${esc(client.nome)}</div>
              <div class="stat-sub">${brl(total)} em compras confirmadas</div>
              <input id="client-modal-foto-input" type="file" accept="image/*" style="display:none;">
              <button class="avatar-photo-btn" data-action="client-pick-foto">${client.foto ? "📷 trocar foto" : "📷 adicionar foto"}</button>
            </div>
          </div>
          <button class="icon-btn" data-action="close-modal">✕</button>
        </div>
        <div class="flex-gap" style="flex-wrap:wrap;margin-bottom:12px;">
          ${client.telefone ? `<a class="btn btn-sm" style="background:#25D366;color:#fff;width:auto;padding:6px 12px;" href="${waLink(client.telefone, `Oi ${client.nome.split(" ")[0]}, tudo bem?`)}" target="_blank">💬 WhatsApp</a>` : ""}
          ${client.aniversario ? `<span class="btn-sm btn-outline btn" style="width:auto;padding:6px 12px;">🎁 ${new Date(client.aniversario + "T00:00:00").toLocaleDateString("pt-BR", { day: "2-digit", month: "long" })}</span>` : ""}
        </div>
        <div class="section-label">Histórico de compras</div>
        ${historico.length === 0 ? `<div class="empty-msg">Nenhuma compra registrada ainda.</div>` :
          historico.map((s) => `<div style="border-bottom:1px solid var(--line);padding:8px 0;display:flex;justify-content:space-between;font-size:14px;">
            <span class="stat-sub">${fmtDateFull(s.status === "pendente" ? s.dataLevado : s.date)}</span>
            <span style="font-family:var(--font-mono);color:var(--ink);">${brl(s.status === "pendente" ? s.valorLevado : s.valor)}${s.status === "pendente" ? " (pendente)" : ""}</span>
          </div>`).join("")}
      </div>
    </div>`;
}

// ---------- actions ----------
async function upsertClient(input) {
  let client;
  const existingById = input.id && clientById(input.id);
  const existingByName = !input.id && state.clients.find((c) => c.nome.trim().toLowerCase() === input.nome.trim().toLowerCase());
  const match = existingById || existingByName;
  if (match) client = { ...match, telefone: input.telefone || match.telefone, aniversario: input.aniversario || match.aniversario, foto: input.foto !== undefined ? input.foto : match.foto };
  else client = { id: uid(), nome: input.nome.trim(), telefone: input.telefone || "", aniversario: input.aniversario || "", foto: input.foto || null, createdAt: todayISO() };
  await storage.set(`client:${client.id}`, JSON.stringify(client));
  const idx = state.clients.findIndex((c) => c.id === client.id);
  if (idx >= 0) state.clients[idx] = client; else state.clients.push(client);
  return client;
}
async function saveSale(saleInput) {
  let clienteId = saleInput.clienteId, clienteNome = saleInput.clienteNome;
  if (clienteNome) {
    const client = await upsertClient({ id: clienteId, nome: clienteNome, telefone: saleInput.clienteTelefone, aniversario: saleInput.clienteAniversario });
    clienteId = client.id; clienteNome = client.nome;
  }
  const sale = { ...saleInput, clienteId, clienteNome };
  await storage.set(`sale:${sale.id}`, JSON.stringify(sale));
  state.sales.unshift(sale);
  state.tab = "vendas"; state.month = monthKey(sale.date);
  ui.regTipo = "direta"; ui.regClienteId = null; ui.regFoto = null;
  renderAll();
}
async function deleteSale(id) {
  if (!confirm("Excluir esta venda registrada?")) return;
  await storage.delete(`sale:${id}`);
  state.sales = state.sales.filter((s) => s.id !== id);
  renderAll();
}
async function toggleConferida(id) {
  const sale = saleById(id); if (!sale) return;
  const updated = { ...sale, conferida: !sale.conferida };
  await storage.set(`sale:${id}`, JSON.stringify(updated));
  state.sales = state.sales.map((s) => (s.id === id ? updated : s));
  refreshVendasList();
}
async function confirmCondicional(id, valorFinal) {
  const sale = saleById(id); if (!sale) return;
  const updated = { ...sale, status: "confirmada", valor: valorFinal, date: todayISO(), dataConfirmacao: todayISO() };
  await storage.set(`sale:${id}`, JSON.stringify(updated));
  state.sales = state.sales.map((s) => (s.id === id ? updated : s));
  ui.confirmSaleId = null; state.month = monthKey(updated.date); state.tab = "vendas";
  renderAll();
}
async function saveSettings(newSettings) {
  await storage.set("settings", JSON.stringify(newSettings));
  state.settings = newSettings;
  renderAll();
}

// ---------- event delegation ----------
document.body.addEventListener("click", async (e) => {
  const t = e.target.closest("[data-action]");
  if (!t) return;
  const action = t.getAttribute("data-action");

  if (action === "set-tab") { state.tab = t.getAttribute("data-tab"); renderAll(); return; }
  if (action === "toggle-theme") { await saveSettings({ ...state.settings, darkMode: !state.settings.darkMode }); return; }
  if (action === "close-modal") { ui.openSaleId = null; ui.confirmSaleId = null; ui.openClientId = null; renderModals(); return; }
  if (action === "open-sale") { ui.openSaleId = t.getAttribute("data-id"); renderModals(); return; }
  if (action === "open-confirm") { ui.confirmSaleId = t.getAttribute("data-id"); renderModals(); return; }
  if (action === "open-client") { ui.openClientId = t.getAttribute("data-id"); renderModals(); return; }
  if (action === "client-pick-foto") { document.getElementById("client-modal-foto-input").click(); return; }
  if (action === "delete-sale") { await deleteSale(t.getAttribute("data-id")); return; }
  if (action === "toggle-conferida") { await toggleConferida(t.getAttribute("data-id")); return; }
  if (action === "confirm-condicional") {
    const valInput = document.getElementById("confirm-valor");
    const num = parseFloat((valInput.value || "").replace(",", "."));
    if (isNaN(num) || num < 0) { alert("Valor inválido."); return; }
    await confirmCondicional(t.getAttribute("data-id"), num);
    return;
  }
  if (action === "month-shift") {
    const [y, m] = state.month.split("-").map(Number);
    const d = new Date(y, m - 1 + Number(t.getAttribute("data-delta")), 1);
    state.month = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    renderContent();
    return;
  }
  if (action === "reg-set-tipo") { ui.regTipo = t.getAttribute("data-tipo"); renderContent(); return; }
  if (action === "reg-pick-foto") { document.getElementById("reg-foto-input").click(); return; }
  if (action === "reg-remove-foto") { ui.regFoto = null; refreshFotoArea(); return; }
  if (action === "reg-pick-client") {
    const c = clientById(t.getAttribute("data-id"));
    if (c) {
      document.getElementById("reg-cliente-nome").value = c.nome;
      document.getElementById("reg-cliente-telefone").value = c.telefone || "";
      document.getElementById("reg-cliente-aniversario").value = c.aniversario || "";
      ui.regClienteId = c.id;
      document.getElementById("reg-cliente-suggestions").innerHTML = "";
      document.getElementById("reg-cliente-hint").innerHTML = "";
      document.getElementById("reg-cliente-extra").style.display = "flex";
      refreshRegSubmitState();
    }
    return;
  }
  if (action === "reg-submit") {
    const valor = parseFloat((document.getElementById("reg-valor").value || "").replace(",", "."));
    const clienteNome = document.getElementById("reg-cliente-nome").value.trim();
    const clienteTelefone = document.getElementById("reg-cliente-telefone").value.trim();
    const clienteAniversario = document.getElementById("reg-cliente-aniversario").value;
    const caixa = document.getElementById("reg-caixa").value.trim();
    const date = document.getElementById("reg-data").value || todayISO();
    if (!(valor > 0)) return;
    if (ui.regTipo === "condicional" && !clienteNome) return;
    const dataFmt = date.split("-").reverse().join("/");
    const resumo = ui.regTipo === "condicional"
      ? `Confirmar registro de condicional?\n\nValor levado: ${brl(valor)}\nCliente: ${clienteNome}\nData: ${dataFmt}`
      : `Confirmar esta venda?\n\nValor: ${brl(valor)}\nCliente: ${clienteNome || "não informado"}\nData: ${dataFmt}`;
    if (!confirm(resumo)) return;
    const base = { id: uid(), clienteId: ui.regClienteId, clienteNome, clienteTelefone, clienteAniversario, caixa, foto: ui.regFoto, conferida: false };
    if (ui.regTipo === "condicional") await saveSale({ ...base, tipo: "condicional", status: "pendente", dataLevado: date, valorLevado: valor, date, valor: 0 });
    else await saveSale({ ...base, tipo: "direta", status: "confirmada", date, valor });
    return;
  }
  if (action === "copy-resumo") {
    const monthSales = state.sales.filter((s) => s.status === "confirmada" && monthKey(s.date) === state.month);
    const total = monthSales.reduce((a, s) => a + s.valor, 0);
    const { current } = tierFor(total, state.settings.tiers);
    const comissao = total * (current.pct / 100);
    const pendentes = state.sales.filter((s) => s.status === "pendente");
    const totalPendente = pendentes.reduce((a, s) => a + (s.valorLevado || 0), 0);
    const topMap = {};
    monthSales.forEach((s) => { const k = s.clienteNome || "sem nome"; topMap[k] = (topMap[k] || 0) + s.valor; });
    const topClientes = Object.entries(topMap).map(([nome, total]) => ({ nome, total })).sort((a, b) => b.total - a.total).slice(0, 3);
    const txt = buildResumoText(total, monthSales.length, current.pct, comissao, totalPendente, pendentes.length, topClientes);
    try { await navigator.clipboard.writeText(txt); t.textContent = "Copiado ✓"; setTimeout(() => { t.innerHTML = "📋 Copiar resumo"; }, 1500); }
    catch { alert("Não consegui copiar. Copie manualmente:\n\n" + txt); }
    return;
  }
  if (action === "toggle-new-client") { ui.showNewClientForm = !ui.showNewClientForm; ui.ncFoto = null; refreshClientesList(); return; }
  if (action === "cancel-new-client") { ui.showNewClientForm = false; ui.ncFoto = null; refreshClientesList(); return; }
  if (action === "nc-pick-foto") { document.getElementById("nc-foto-input").click(); return; }
  if (action === "nc-remove-foto") { ui.ncFoto = null; refreshNcFotoArea(); return; }
  if (action === "save-new-client") {
    const nome = document.getElementById("nc-nome").value.trim();
    if (!nome) return;
    const telefone = document.getElementById("nc-telefone").value.trim();
    const aniversario = document.getElementById("nc-aniversario").value;
    await upsertClient({ nome, telefone, aniversario, foto: ui.ncFoto });
    ui.showNewClientForm = false;
    ui.ncFoto = null;
    refreshClientesList();
    return;
  }
  if (action === "cfg-add-tier") { state.settings.tiers.push({ min: 0, pct: 0 }); document.getElementById("cfg-tiers").innerHTML = renderTierRows(state.settings.tiers); return; }
  if (action === "cfg-remove-tier") { state.settings.tiers.splice(Number(t.getAttribute("data-i")), 1); document.getElementById("cfg-tiers").innerHTML = renderTierRows(state.settings.tiers); return; }
  if (action === "cfg-save") {
    const tiers = state.settings.tiers.map((_, i) => ({
      min: Number(document.querySelector(`.cfg-tier-min[data-i="${i}"]`).value),
      pct: Number(document.querySelector(`.cfg-tier-pct[data-i="${i}"]`).value),
    }));
    const newSettings = {
      ...state.settings,
      loja: document.getElementById("cfg-loja").value.trim() || "Minha loja",
      metaMensal: Number(document.getElementById("cfg-meta").value) || 0,
      diasAlertaCondicional: Number(document.getElementById("cfg-dias").value) || 7,
      tiers,
    };
    const metaMudou = newSettings.metaMensal !== state.settings.metaMensal;
    const resumo = metaMudou
      ? `Salvar configurações?\n\nMeta mensal: ${brl(newSettings.metaMensal)} (era ${brl(state.settings.metaMensal)})`
      : `Salvar configurações?`;
    if (!confirm(resumo)) return;
    await saveSettings(newSettings);
    t.textContent = "Salvo ✓";
    setTimeout(() => { t.textContent = "Salvar configurações"; }, 1500);
    return;
  }
});

document.body.addEventListener("input", (e) => {
  if (e.target.id === "vendas-busca") { ui.vendasBusca = e.target.value; refreshVendasList(); return; }
  if (e.target.id === "clientes-busca") { ui.clientesBusca = e.target.value; refreshClientesList(); return; }
  if (e.target.id === "reg-cliente-nome") { ui.regClienteId = null; refreshClienteSuggestions(); refreshRegSubmitState(); return; }
  if (e.target.id === "reg-valor") { refreshRegSubmitState(); return; }
});

document.body.addEventListener("change", async (e) => {
  if (e.target.id === "reg-foto-input") {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    ui.regCompressing = true; refreshFotoArea();
    try { ui.regFoto = await compressImage(file, 900, 0.6); }
    catch { alert("Não consegui processar a foto. Tenta de novo."); }
    finally { ui.regCompressing = false; refreshFotoArea(); }
  }
  if (e.target.id === "nc-foto-input") {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    ui.ncCompressing = true; refreshNcFotoArea();
    try { ui.ncFoto = await compressImage(file, 300, 0.7); }
    catch { alert("Não consegui processar a foto. Tenta de novo."); }
    finally { ui.ncCompressing = false; refreshNcFotoArea(); }
  }
  if (e.target.id === "client-modal-foto-input") {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const client = clientById(ui.openClientId);
    if (!client) return;
    try {
      const foto = await compressImage(file, 300, 0.7);
      await upsertClient({ id: client.id, nome: client.nome, foto });
      renderModals();
      refreshClientesList();
    } catch { alert("Não consegui processar a foto. Tenta de novo."); }
  }
});

document.body.addEventListener("focusin", (e) => {
  if (e.target.id === "reg-cliente-nome") { refreshClienteSuggestions(true); }
});

document.body.addEventListener("focusout", (e) => {
  if (e.target.id === "reg-cliente-nome") {
    setTimeout(() => { const box = document.getElementById("reg-cliente-suggestions"); if (box) box.innerHTML = ""; }, 150);
  }
});

// ---------- init ----------
(async function init() {
  const sidx = await storage.list("sale:");
  for (const k of sidx.keys) { const r = await storage.get(k); if (r && r.value) { try { state.sales.push(JSON.parse(r.value)); } catch {} } }
  const cidx = await storage.list("client:");
  for (const k of cidx.keys) { const r = await storage.get(k); if (r && r.value) { try { state.clients.push(JSON.parse(r.value)); } catch {} } }
  const s = await storage.get("settings");
  if (s && s.value) { try { state.settings = { ...DEFAULT_SETTINGS, ...JSON.parse(s.value) }; } catch {} }
  state.loading = false;
  renderAll();
})();
</script>
</body>
